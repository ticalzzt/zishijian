<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>灵体觉醒 - 第一章 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --spirit-blue: #6eb5ff;
            --spirit-cyan: #4ecdc4;
            --spirit-purple: #a388ee;
            --spirit-pink: #f8b4d9;
            --spirit-glow: rgba(110, 181, 255, 0.6);
            --ink-black: #0a0908;
            --dark-bg: rgba(15, 20, 35, 0.98);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--spirit-blue);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(110, 181, 255, 0.2);
        }
        
        .back-btn, .nav-link {
            color: var(--spirit-blue);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            border-radius: 4px;
        }
        
        .back-btn { border-color: rgba(110, 181, 255, 0.4); }
        
        .back-btn:hover, .nav-link:hover {
            color: var(--spirit-cyan);
            text-shadow: 0 0 15px rgba(110, 181, 255, 0.8);
            border-color: var(--spirit-cyan);
            background: rgba(110, 181, 255, 0.1);
        }
        
        /* 进度指示器 */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(110, 181, 255, 0.2);
            z-index: 99;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--spirit-blue), var(--spirit-cyan));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--spirit-glow);
        }
        
        /* 场景容器 */
        .scene-container {
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }
        
        /* 场景背景 */
        .scene-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: linear-gradient(180deg, 
                rgba(15, 20, 35, 0.85) 0%, 
                rgba(30, 40, 60, 0.75) 50%,
                rgba(15, 20, 35, 0.85) 100%);
        }
        
        /* 场景图片 */
        .scene-image-wrapper {
            width: 100%;
            max-width: 800px;
            margin-bottom: 2rem;
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .scene-image-wrapper.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .scene-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 
                0 0 60px rgba(110, 181, 255, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(110, 181, 255, 0.3);
        }
        
        /* 场景标题 */
        .scene-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.8rem;
            color: var(--spirit-cyan);
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px var(--spirit-glow);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }
        
        .scene-title.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 叙事文字 */
        .narrative-text {
            max-width: 650px;
            text-align: center;
            color: #d0dce8;
            font-size: 1.15rem;
            line-height: 2;
            margin-bottom: 2.5rem;
            padding: 1.5rem 2rem;
            background: rgba(30, 45, 70, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(110, 181, 255, 0.2);
            box-shadow: 0 0 30px rgba(110, 181, 255, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
        }
        
        .narrative-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 选择区域 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
        }
        
        .choices-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .choice-btn {
            padding: 1.2rem 2rem;
            background: linear-gradient(135deg, 
                rgba(110, 181, 255, 0.15), 
                rgba(163, 136, 238, 0.1));
            border: 2px solid var(--spirit-blue);
            color: var(--spirit-blue);
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        
        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(110, 181, 255, 0.2), 
                transparent);
            transition: left 0.5s;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, 
                rgba(110, 181, 255, 0.35), 
                rgba(163, 136, 238, 0.25));
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(110, 181, 255, 0.3);
            border-color: var(--spirit-cyan);
            color: var(--spirit-cyan);
        }
        
        .choice-btn:hover::before {
            left: 100%;
        }
        
        /* 章节结束页面 */
        .chapter-end {
            text-align: center;
            padding: 3rem 2rem;
        }
        
        .chapter-end h2 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--spirit-cyan);
            margin-bottom: 1rem;
            text-shadow: 0 0 30px var(--spirit-glow);
        }
        
        .chapter-end p {
            color: #b8c5d6;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        .continue-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, 
                rgba(110, 181, 255, 0.3), 
                rgba(163, 136, 238, 0.2));
            border: 2px solid var(--spirit-cyan);
            color: var(--spirit-cyan);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.2rem;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .continue-btn:hover {
            background: linear-gradient(135deg, 
                rgba(110, 181, 255, 0.5), 
                rgba(163, 136, 238, 0.4));
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(110, 181, 255, 0.5);
        }
        
        .back-link {
            display: block;
            margin-top: 2rem;
            color: rgba(110, 181, 255, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--spirit-blue);
        }
        
        /* 淡入淡出动画 */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .scene-title { font-size: 1.5rem; }
            .narrative-text { 
                font-size: 1rem; 
                padding: 1.2rem 1.5rem;
                margin: 0 1rem 2rem;
            }
            .choice-btn { 
                font-size: 0.95rem; 
                padding: 1rem 1.5rem;
            }
            .top-nav { 
                padding: 0.6rem 1rem; 
                gap: 0.8rem;
                flex-wrap: wrap;
            }
            .nav-link { 
                font-size: 0.85rem; 
                padding: 0.4rem 0.7rem;
            }
            .chapter-end h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <a href="character-player.html" class="nav-link">角色介绍</a>
        <a href="character-wukong.html" class="nav-link">大圣宇宙</a>
        <a href="index.html" class="nav-link">首页</a>
    </nav>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    
    <div class="scene-bg"></div>
    
    <div id="sceneContent" class="scene-container">
        <!-- 场景内容将动态加载 -->
    </div>

    <script>
        // 故事数据
        const storyData = {
            scenes: {
                'scene-1': {
                    id: 'scene-1',
                    title: '第一章 · 觉醒',
                    image: 'images/story/spirit/spirit_scene_0.jpg',
                    narrative: '你从沉睡中醒来，发现自己是一团淡蓝色的光。周围是无尽的虚空，黑暗而寂静。但在这黑暗中，有无数细小的光点在漂浮——那是记忆碎片，你能感受到它们的存在，却抓不住。',
                    choices: [
                        { text: '伸手触碰最近的一块碎片', target: 'scene-2a' },
                        { text: '先观察周围的环境', target: 'scene-2b' }
                    ],
                    progress: 12
                },
                'scene-2a': {
                    id: 'scene-2a',
                    title: '触碰碎片',
                    image: 'images/story/spirit/spirit_scene_1.jpg',
                    narrative: '碎片在你的指尖化作一缕光，流入你的意识。你看到了一座山——灵台方寸山，山上有一个人影在等你。但画面太模糊了，你看不清他的脸，只觉得那背影有些熟悉。',
                    choices: [
                        { text: '追寻山的方向', target: 'scene-3a1' },
                        { text: '寻找更多碎片拼凑画面', target: 'scene-3a2' }
                    ],
                    progress: 37
                },
                'scene-2b': {
                    id: 'scene-2b',
                    title: '观察环境',
                    image: 'images/story/spirit/spirit_scene_2.jpg',
                    narrative: '你环顾四周，这是一个介于存在与虚无之间的空间。远处有几团微弱的光，像萤火虫在呼唤你。下方，一片深紫色的云海缓缓流动，波涛汹涌。',
                    choices: [
                        { text: '飞向最近的光', target: 'scene-3b1' },
                        { text: '潜入云海探索', target: 'scene-3b2' }
                    ],
                    progress: 37
                },
                'scene-3a1': {
                    id: 'scene-3a1',
                    title: '追寻山影',
                    image: 'images/story/spirit/spirit_scene_3.jpg',
                    narrative: '你向山的方向飞去，风从四面八方涌来，穿过你那由光构成的身体。你听到一个声音，像远处的钟声——"回来。"这声音很熟悉，你确定自己曾经听过无数次。',
                    choices: [
                        { text: '跟随声音', target: 'scene-4' },
                        { text: '停下来仔细听', target: 'scene-4' }
                    ],
                    progress: 62
                },
                'scene-3a2': {
                    id: 'scene-3a2',
                    title: '收集碎片',
                    image: 'images/story/spirit/spirit_scene_4.jpg',
                    narrative: '你收集了更多碎片，它们拼凑出一个模糊的故事：你曾是某个人的守护灵，在他最危难的时刻，你选择了封印自己来保护他。但...他是谁？你已经不记得了。',
                    choices: [
                        { text: '"我必须找到他"', target: 'scene-4' },
                        { text: '"也许忘记是更好的选择"', target: 'scene-4' }
                    ],
                    progress: 62
                },
                'scene-3b1': {
                    id: 'scene-3b1',
                    title: '飞向微光',
                    image: 'images/story/spirit/spirit_scene_5.jpg',
                    narrative: '你飞向最近的光，它温暖而柔和。靠近后，你看到光中有一个画面——一个小女孩在花丛中笑着奔跑，身后是漫天飞舞的蝴蝶。那个女孩...是你吗？',
                    choices: [
                        { text: '走进这段记忆', target: 'scene-4' },
                        { text: '这可能是个陷阱', target: 'scene-4' }
                    ],
                    progress: 62
                },
                'scene-3b2': {
                    id: 'scene-3b2',
                    title: '潜入云海',
                    image: 'images/story/spirit/spirit_scene_6.jpg',
                    narrative: '你沉入云海，周围变暗了。但在最深处，你看到了一道金色的光——那是封印的核心，你沉睡的地方。封印上刻着一行字："以灵之名，护你所爱。"',
                    choices: [
                        { text: '触碰封印', target: 'scene-4' },
                        { text: '记住这行字，先离开', target: 'scene-4' }
                    ],
                    progress: 62
                },
                'scene-4': {
                    id: 'scene-4',
                    title: '汇聚',
                    image: 'images/story/spirit/spirit_scene_7.jpg',
                    narrative: '无论走了哪条路，你都能感受到一股力量在召唤你。你站在虚空中一座发光的桥上，前方是一扇古老的门。门上有一个手印，大小刚好——像是为你准备的。',
                    choices: [
                        { text: '按下手印，开启记忆', target: 'ending' },
                        { text: '转身回到虚空', target: 'ending-alt' }
                    ],
                    progress: 87
                }
            },
            endings: {
                'ending': {
                    title: '第一章 · 觉醒 · 完',
                    narrative: '你的手按在门上，一股温暖的力量流入体内。记忆的闸门缓缓打开，你看到了过去的片段——你曾是一个少女，在花丛中追逐蝴蝶。直到有一天，灾难降临，你选择化作灵体，守护你想保护的人。现在，是时候醒来了。',
                    teaser: '即将开启：第二章 · 记忆之河',
                    progress: 100
                },
                'ending-alt': {
                    title: '第一章 · 觉醒 · 完',
                    narrative: '你转身离开，但那股力量依然在召唤你。你知道，这扇门会一直在这里等你。记忆不会消失，它们只是在等待合适的时机回归。无论你走多远，最终都会回来。',
                    teaser: '即将开启：第二章 · 记忆之河',
                    progress: 100
                }
            }
        };
        
        let currentScene = 'scene-1';
        let visitedScenes = [];
        
        function goBack() {
            window.location.href = 'character-player.html';
        }
        
        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function renderScene(sceneId) {
            const container = document.getElementById('sceneContent');
            const scene = storyData.scenes[sceneId];
            
            if (!scene) return;
            
            // 淡出当前内容
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = `
                    <div class="scene-image-wrapper">
                        <img src="${scene.image}" alt="${scene.title}" class="scene-image">
                    </div>
                    <h2 class="scene-title">${scene.title}</h2>
                    <p class="narrative-text">${scene.narrative}</p>
                    <div class="choices-container">
                `;
                
                scene.choices.forEach(choice => {
                    html += `<button class="choice-btn" onclick="goToScene('${choice.target}')">${choice.text}</button>`;
                });
                
                html += '</div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                // 更新进度
                updateProgress(scene.progress);
                
                // 触发动画
                setTimeout(() => {
                    document.querySelectorAll('.scene-image-wrapper, .scene-title, .narrative-text, .choices-container').forEach(el => {
                        el.classList.add('visible');
                    });
                }, 100);
                
                // 记录访问
                if (!visitedScenes.includes(sceneId)) {
                    visitedScenes.push(sceneId);
                }
            }, 500);
        }
        
        function renderEnding(endingId) {
            const container = document.getElementById('sceneContent');
            const ending = storyData.endings[endingId];
            
            if (!ending) return;
            
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = `
                    <div class="chapter-end">
                        <h2>${ending.title}</h2>
                        <p class="narrative-text">${ending.narrative}</p>
                        <p class="continue-hint" style="color: var(--spirit-purple); margin-top: 1.5rem; font-size: 1.1rem;">
                            ✦ ${ending.teaser} ✦
                        </p>
                        <a href="character-player.html" class="continue-btn">返回角色介绍</a>
                        <a href="index.html" class="back-link">← 返回首页</a>
                    </div>
                `;
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                updateProgress(ending.progress);
            }, 500);
        }
        
        function goToScene(sceneId) {
            if (sceneId === 'ending' || sceneId === 'ending-alt') {
                renderEnding(sceneId);
            } else {
                currentScene = sceneId;
                renderScene(sceneId);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderScene('scene-1');
        });
    </script>
</body>
</html>
