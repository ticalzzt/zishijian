<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>身份创建器 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/enhanced-creator.css">
    <style>
        :root {
            --ink-black: #0a0908;
            --ancient-gold: #c9a227;
            --dark-red: #8b0000;
            --bronze-light: #d4a84b;
            --bronze-dark: #8b6914;
        }
        body {
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }
        h1, h2, h3 { font-family: 'ZCOOL XiaoWei', serif; }
        .top-nav {
            background: linear-gradient(180deg, rgba(10,9,8,0.98) 0%, rgba(10,9,8,0.9) 100%);
            border-bottom: 2px solid var(--ancient-gold);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.3), inset 0 -1px 0 rgba(201, 162, 39, 0.2);
        }
        .back-btn, .nav-link { color: var(--ancient-gold); font-family: 'ZCOOL XiaoWei', serif; }
        .back-btn:hover, .nav-link:hover { color: var(--bronze-light); text-shadow: 0 0 10px rgba(201, 162, 39, 0.8); }

        .creator-header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(180deg, transparent 0%, rgba(139, 0, 0, 0.1) 50%, transparent 100%);
            border-bottom: 2px solid var(--ancient-gold);
            margin-bottom: 2rem;
        }
        .creator-header h1 {
            color: var(--ancient-gold);
            font-size: 2.2rem;
            margin-bottom: 1rem;
            text-shadow: 
                0 0 10px rgba(201, 162, 39, 0.8),
                0 0 30px rgba(201, 162, 39, 0.5);
            animation: goldShimmer 4s ease-in-out infinite;
        }
        @keyframes goldShimmer {
            0%, 100% { text-shadow: 0 0 10px rgba(201, 162, 39, 0.8), 0 0 30px rgba(201, 162, 39, 0.5); }
            50% { text-shadow: 0 0 15px rgba(201, 162, 39, 1), 0 0 40px rgba(201, 162, 39, 0.7), 0 0 60px rgba(201, 162, 39, 0.4); }
        }
        .creator-header p { color: var(--bronze-light); font-size: 1.1rem; }

        .creator-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .form-section {
            background: linear-gradient(145deg, rgba(20, 18, 15, 0.95), rgba(10, 9, 8, 0.98));
            border: 2px solid var(--bronze-dark);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.7),
                0 0 15px rgba(201, 162, 39, 0.1);
        }
        .form-section::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1px solid rgba(201, 162, 39, 0.2);
            pointer-events: none;
        }
        .form-section h2 {
            color: var(--ancient-gold);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--bronze-dark);
            text-shadow: 0 0 8px rgba(201, 162, 39, 0.4);
        }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label {
            color: var(--ancient-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1rem;
        }
        .form-group input[type="text"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--bronze-dark);
            color: #e8dcc8;
            padding: 0.8rem 1rem;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: var(--ancient-gold);
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.3);
        }
        .form-group input[type="text"]::placeholder { color: rgba(201, 162, 39, 0.4); }

        .race-grid, .treasure-grid, .law-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }
        .realm-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .race-card, .treasure-card, .law-card {
            cursor: pointer;
        }
        .race-card input, .treasure-card input, .law-card input {
            display: none;
        }
        .race-content, .treasure-content, .law-content {
            background: linear-gradient(145deg, rgba(30, 25, 20, 0.9), rgba(15, 12, 10, 0.95));
            border: 1px solid var(--bronze-dark);
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-align: center;
        }
        .race-card:hover .race-content, .treasure-card:hover .treasure-content, .law-card:hover .law-content {
            border-color: var(--ancient-gold);
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.2);
        }
        .race-card input:checked + .race-content,
        .treasure-card input:checked + .treasure-content,
        .law-card input:checked + .law-content {
            border: 2px solid var(--ancient-gold);
            background: linear-gradient(145deg, rgba(40, 30, 20, 0.95), rgba(25, 20, 15, 0.98));
            box-shadow: 
                0 0 20px rgba(201, 162, 39, 0.3),
                inset 0 0 20px rgba(201, 162, 39, 0.1);
        }

        .race-icon, .treasure-icon, .law-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bronze-dark), var(--ancient-gold));
            color: var(--ink-black);
            font-weight: bold;
            font-size: 1.1rem;
        }
        .race-name, .treasure-name, .law-name {
            color: var(--bronze-light);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1rem;
        }
        .race-desc {
            color: #a09080;
            font-size: 0.8rem;
        }
        .race-card input:checked + .race-content .race-name,
        .race-card input:checked + .race-content .race-icon {
            color: var(--ancient-gold);
        }
        .race-card input:checked + .race-content .race-icon {
            background: linear-gradient(135deg, var(--dark-red), var(--ancient-gold));
            color: var(--ink-black);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
        }

        .realm-item {
            cursor: pointer;
        }
        .realm-item input { display: none; }
        .realm-name, .realm-desc {
            display: block;
            padding: 0.6rem 1.2rem;
            background: linear-gradient(145deg, rgba(25, 20, 15, 0.9), rgba(15, 12, 10, 0.95));
            border: 1px solid var(--bronze-dark);
            transition: all 0.3s ease;
        }
        .realm-item:hover .realm-name, .realm-item:hover .realm-desc {
            border-color: var(--ancient-gold);
        }
        .realm-name {
            color: var(--bronze-light);
            font-family: 'ZCOOL XiaoWei', serif;
            border-bottom: none;
        }
        .realm-desc {
            color: #807060;
            font-size: 0.85rem;
            border-top: none;
            margin-top: -1px;
        }
        .realm-item input:checked + .realm-name {
            background: linear-gradient(135deg, var(--dark-red), #4a0000);
            color: var(--ancient-gold);
            border-color: var(--ancient-gold);
        }
        .realm-item input:checked + .realm-name + .realm-desc {
            color: var(--bronze-light);
        }
        .realm-item.special .realm-name {
            background: linear-gradient(135deg, var(--ancient-gold), var(--bronze-dark));
            color: var(--ink-black);
        }
        .realm-item.special:hover .realm-name {
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.5);
        }

        .generate-btn {
            width: 100%;
            padding: 1.2rem 2rem;
            background: linear-gradient(145deg, var(--dark-red), #5a0000);
            border: 2px solid var(--ancient-gold);
            color: var(--ancient-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
            margin-top: 2rem;
        }
        .generate-btn:hover {
            background: linear-gradient(145deg, var(--ancient-gold), var(--bronze-dark));
            color: var(--ink-black);
            box-shadow: 0 0 30px rgba(201, 162, 39, 0.6);
            transform: translateY(-2px);
        }

        .card-preview {
            margin-top: 3rem;
            background: linear-gradient(145deg, rgba(20, 18, 15, 0.95), rgba(10, 9, 8, 0.98));
            border: 2px solid var(--ancient-gold);
            padding: 2rem;
            position: relative;
        }
        .card-preview::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1px solid rgba(201, 162, 39, 0.3);
            pointer-events: none;
        }
        .card-preview.hidden { display: none; }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--bronze-dark);
        }
        .preview-header h3 {
            color: var(--ancient-gold);
            font-size: 1.3rem;
            text-shadow: 0 0 8px rgba(201, 162, 39, 0.5);
        }
        .download-btn {
            background: linear-gradient(135deg, var(--bronze-dark), var(--ancient-gold));
            border: 1px solid var(--ancient-gold);
            color: var(--ink-black);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-family: 'ZCOOL XiaoWei', serif;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background: var(--ancient-gold);
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.5);
        }
        .canvas-container {
            display: flex;
            justify-content: center;
        }
        #identity-canvas {
            border: 2px solid var(--bronze-dark);
            box-shadow: 0 0 30px rgba(201, 162, 39, 0.3);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--ink-black); }
        ::-webkit-scrollbar-thumb { background: var(--bronze-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ancient-gold); }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="back-btn">&#8592; 返回首页</a>
        <a href="timeline.html" class="nav-link">卷 轴 世界时间线</a>
        <a href="character-wukong.html" class="nav-link">猴 孙悟空</a>
    </nav>

    <main class="creator-page">
        <header class="creator-header">
            <h1>炼 器 诸天身份创建器</h1>
            <p>选择你的种族、修为、法宝，生成独属于你的宇宙身份卡</p>
        </header>

        <div class="creator-container">
            <form id="enhanced-form" class="enhanced-form">
                <section class="form-section">
                    <h2>铭 文 基础信息</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>宇宙名称</label>
                            <input type="text" id="universe-name" placeholder="例如：青云界、万星域..." required>
                        </div>
                        <div class="form-group">
                            <label>你的名号</label>
                            <input type="text" id="player-title" placeholder="例如：逍遥子、星河剑圣..." required>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h2>化 身 种族选择</h2>
                    <div class="race-grid">
                        <label class="race-card">
                            <input type="radio" name="race" value="human" checked>
                            <div class="race-content">
                                <span class="race-icon">人</span>
                                <span class="race-name">人族</span>
                                <span class="race-desc">智慧第一，学习最快</span>
                            </div>
                        </label>
                        <label class="race-card">
                            <input type="radio" name="race" value="demon">
                            <div class="race-content">
                                <span class="race-icon">妖</span>
                                <span class="race-name">妖族</span>
                                <span class="race-desc">天赋异禀，寿命悠长</span>
                            </div>
                        </label>
                        <label class="race-card">
                            <input type="radio" name="race" value="immortal">
                            <div class="race-content">
                                <span class="race-icon">仙</span>
                                <span class="race-name">仙族</span>
                                <span class="race-desc">血脉高贵，掌控法则</span>
                            </div>
                        </label>
                        <label class="race-card">
                            <input type="radio" name="race" value="buddha">
                            <div class="race-content">
                                <span class="race-icon">佛</span>
                                <span class="race-name">佛门</span>
                                <span class="race-desc">心境澄明，万法不侵</span>
                            </div>
                        </label>
                        <label class="race-card">
                            <input type="radio" name="race" value="ghost">
                            <div class="race-content">
                                <span class="race-icon">鬼</span>
                                <span class="race-name">鬼族</span>
                                <span class="race-desc">穿行阴阳，来去无踪</span>
                            </div>
                        </label>
                        <label class="race-card">
                            <input type="radio" name="race" value="divine">
                            <div class="race-content">
                                <span class="race-icon">神</span>
                                <span class="race-name">神族</span>
                                <span class="race-desc">天生神力，掌管天地</span>
                            </div>
                        </label>
                    </div>
                </section>

                <section class="form-section">
                    <h2>境 界 修为境界</h2>
                    <div class="realm-selector">
                        <label class="realm-item">
                            <input type="radio" name="realm" value="mortal" checked>
                            <span class="realm-name">凡境</span>
                            <span class="realm-desc">肉体凡胎</span>
                        </label>
                        <label class="realm-item">
                            <input type="radio" name="realm" value="qi-gathering">
                            <span class="realm-name">聚气境</span>
                            <span class="realm-desc">初窥门径</span>
                        </label>
                        <label class="realm-item">
                            <input type="radio" name="realm" value="foundation">
                            <span class="realm-name">筑基境</span>
                            <span class="realm-desc">奠定根基</span>
                        </label>
                        <label class="realm-item">
                            <input type="radio" name="realm" value="core">
                            <span class="realm-name">金丹境</span>
                            <span class="realm-desc">凝结金丹</span>
                        </label>
                        <label class="realm-item">
                            <input type="radio" name="realm" value="nascent">
                            <span class="realm-name">元婴境</span>
                            <span class="realm-desc">元神初成</span>
                        </label>
                        <label class="realm-item">
                            <input type="radio" name="realm" value="transcendent">
                            <span class="realm-name">化神境</span>
                            <span class="realm-desc">超凡入圣</span>
                        </label>
                        <label class="realm-item special">
                            <input type="radio" name="realm" value="enlightened">
                            <span class="realm-name">大觉境</span>
                            <span class="realm-desc">觉字辈·觉者</span>
                        </label>
                    </div>
                </section>

                <section class="form-section">
                    <h2>法 宝 法宝选择</h2>
                    <div class="treasure-grid">
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="sword">
                            <div class="treasure-content">
                                <span class="treasure-icon">剑</span>
                                <span class="treasure-name">剑</span>
                            </div>
                        </label>
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="staff">
                            <div class="treasure-content">
                                <span class="treasure-icon">杖</span>
                                <span class="treasure-name">杖</span>
                            </div>
                        </label>
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="fan">
                            <div class="treasure-content">
                                <span class="treasure-icon">扇</span>
                                <span class="treasure-name">扇</span>
                            </div>
                        </label>
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="bell">
                            <div class="treasure-content">
                                <span class="treasure-icon">铃</span>
                                <span class="treasure-name">铃</span>
                            </div>
                        </label>
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="pagoda">
                            <div class="treasure-content">
                                <span class="treasure-icon">塔</span>
                                <span class="treasure-name">塔</span>
                            </div>
                        </label>
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="bottle">
                            <div class="treasure-content">
                                <span class="treasure-icon">瓶</span>
                                <span class="treasure-name">瓶</span>
                            </div>
                        </label>
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="scroll">
                            <div class="treasure-content">
                                <span class="treasure-icon">卷</span>
                                <span class="treasure-name">卷轴</span>
                            </div>
                        </label>
                        <label class="treasure-card">
                            <input type="checkbox" name="treasure" value="mirror">
                            <div class="treasure-content">
                                <span class="treasure-icon">镜</span>
                                <span class="treasure-name">镜</span>
                            </div>
                        </label>
                    </div>
                </section>

                <section class="form-section">
                    <h2>天 道 核心法则</h2>
                    <div class="law-grid">
                        <label class="law-card">
                            <input type="radio" name="law" value="cultivation" checked>
                            <div class="law-content">
                                <span class="law-icon">道</span>
                                <span class="law-name">修仙问道</span>
                            </div>
                        </label>
                        <label class="law-card">
                            <input type="radio" name="law" value="magic">
                            <div class="law-content">
                                <span class="law-icon">魔</span>
                                <span class="law-name">魔法世界</span>
                            </div>
                        </label>
                        <label class="law-card">
                            <input type="radio" name="law" value="technology">
                            <div class="law-content">
                                <span class="law-icon">机</span>
                                <span class="law-name">科技文明</span>
                            </div>
                        </label>
                        <label class="law-card">
                            <input type="radio" name="law" value="martial">
                            <div class="law-content">
                                <span class="law-icon">武</span>
                                <span class="law-name">武道至上</span>
                            </div>
                        </label>
                        <label class="law-card">
                            <input type="radio" name="law" value="chaos">
                            <div class="law-content">
                                <span class="law-icon">混沌</span>
                                <span class="law-name">混沌原初</span>
                            </div>
                        </label>
                    </div>
                </section>

                <button type="submit" class="generate-btn">铸 造 生成身份卡</button>
            </form>

            <div id="card-preview" class="card-preview hidden">
                <div class="preview-header">
                    <h3>玉 简 身份卡预览</h3>
                    <button id="download-btn" class="download-btn">载 出 下载图片</button>
                </div>
                <div class="canvas-container">
                    <canvas id="identity-canvas" width="450" height="650"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="js/enhanced-creator.js"></script>
</body>
</html>
