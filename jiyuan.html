<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>觉字机缘 - 藏子世间</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }
        
        .jiyuan-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            background: 
                linear-gradient(rgba(10, 9, 8, 0.85), rgba(10, 9, 8, 0.9)),
                url('images/jiyuan_fortune_0.jpg') center/cover no-repeat;
        }
        
        .back-home {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: rgba(255, 215, 0, 0.7);
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            transition: all 0.3s;
            z-index: 100;
        }
        
        .back-home:hover {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
        }
        
        .result-container {
            width: 100%;
            max-width: 500px;
            padding: 2rem 1.5rem;
            border-radius: 20px;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-container.tianming {
            background: linear-gradient(135deg, #1a1a0a 0%, #2a2a1a 100%);
            border: 3px solid #ffd700;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.5), inset 0 0 40px rgba(255, 215, 0, 0.1);
        }
        
        .result-container.shangshang {
            background: linear-gradient(135deg, #1a0a2a 0%, #2a1a3a 100%);
            border: 3px solid #9966ff;
            box-shadow: 0 0 60px rgba(153, 102, 255, 0.4), inset 0 0 30px rgba(153, 102, 255, 0.1);
        }
        
        .result-container.zhong {
            background: linear-gradient(135deg, #0a1a2a 0%, #1a2a3a 100%);
            border: 3px solid #4488ff;
            box-shadow: 0 0 50px rgba(68, 136, 255, 0.3), inset 0 0 20px rgba(68, 136, 255, 0.1);
        }
        
        .result-container.xia {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border: 3px solid #666;
            box-shadow: 0 0 40px rgba(100, 100, 100, 0.2), inset 0 0 15px rgba(100, 100, 100, 0.1);
        }
        
        .result-container.jieshu {
            background: linear-gradient(135deg, #2a0a0a 0%, #3a1a1a 100%);
            border: 3px solid #ff4444;
            box-shadow: 0 0 60px rgba(255, 68, 68, 0.4), inset 0 0 25px rgba(255, 68, 68, 0.1);
        }
        
        .level-badge {
            display: inline-block;
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }
        
        .tianming .level-badge { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
        .shangshang .level-badge { background: rgba(153, 102, 255, 0.2); color: #9966ff; }
        .zhong .level-badge { background: rgba(68, 136, 255, 0.2); color: #4488ff; }
        .xia .level-badge { background: rgba(150, 150, 150, 0.2); color: #999; }
        .jieshu .level-badge { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        
        .fortune-title {
            font-family: 'LXGW WenKai', serif;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px currentColor;
        }
        
        .fortune-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1.5rem;
            line-height: 1.8;
            font-style: italic;
        }
        
        .story-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            text-align: left;
        }
        
        .story-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.8rem;
            letter-spacing: 0.1em;
        }
        
        .story-content {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.9;
        }
        
        .encounter-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .encounter-icon {
            font-size: 1.5rem;
        }
        
        .encounter-text {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .encounter-target {
            font-size: 1.1rem;
            color: #ffd700;
            font-weight: 600;
        }
        
        .guide-section {
            border-left: 3px solid rgba(255, 215, 0, 0.5);
            padding-left: 1rem;
            margin: 1.5rem 0;
            text-align: left;
        }
        
        .guide-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.5rem;
        }
        
        .guide-text {
            font-size: 1rem;
            color: rgba(255, 215, 0, 0.9);
            line-height: 1.6;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
            border: none;
        }
        
        .btn-redraw {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
        }
        
        .btn-redraw:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }
        
        .btn-save {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
        }
        
        .btn-save:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }
        
        .btn-saved {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4caf50;
            color: #4caf50;
        }
        
        .history-section {
            width: 100%;
            max-width: 500px;
            margin-top: 2rem;
        }
        
        .history-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .history-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .history-item {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .history-item.tianming { background: rgba(255, 215, 0, 0.15); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.3); }
        .history-item.shangshang { background: rgba(153, 102, 255, 0.15); color: #9966ff; border: 1px solid rgba(153, 102, 255, 0.3); }
        .history-item.zhong { background: rgba(68, 136, 255, 0.15); color: #4488ff; border: 1px solid rgba(68, 136, 255, 0.3); }
        .history-item.xia { background: rgba(150, 150, 150, 0.15); color: #999; border: 1px solid rgba(150, 150, 150, 0.3); }
        .history-item.jieshu { background: rgba(255, 68, 68, 0.15); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3); }
        
        .history-item:hover {
            transform: scale(1.05);
        }
        
        .stats {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
        }
        
        .loading-symbol {
            font-size: 4rem;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            animation: floatUp 15s infinite linear;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
        
        /* =====================
           响应式设计
           ===================== */
        
        /* 平板设备 */
        @media (max-width: 768px) {
            .jiyuan-page {
                padding: 1.5rem 0.8rem;
            }
            
            .back-home {
                top: 10px;
                left: 10px;
                padding: 10px 14px;
                font-size: 0.75rem;
                min-width: 44px;
                min-height: 44px;
                display: flex;
                align-items: center;
            }
            
            .result-container {
                padding: 1.5rem 1rem;
                border-radius: 15px;
                margin: 0 0.5rem;
            }
            
            .fortune-title {
                font-size: 1.5rem;
            }
            
            .fortune-text {
                font-size: 1rem;
            }
            
            .story-section {
                padding: 1rem;
            }
            
            .story-content {
                font-size: 0.95rem;
                line-height: 1.8;
            }
            
            .level-badge {
                padding: 6px 18px;
                font-size: 1rem;
            }
            
            .action-buttons {
                gap: 10px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 0.85rem;
                min-width: 44px;
                min-height: 44px;
            }
            
            .stats {
                bottom: 10px;
                right: 10px;
                font-size: 0.7rem;
            }
        }
        
        /* 小屏移动设备 */
        @media (max-width: 480px) {
            .jiyuan-page {
                padding: 1rem 0.5rem;
            }
            
            .back-home {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
            
            .result-container {
                padding: 1.2rem 0.8rem;
                border-radius: 12px;
                margin: 0 0.3rem;
            }
            
            .fortune-title {
                font-size: 1.3rem;
                margin-bottom: 0.8rem;
            }
            
            .fortune-text {
                font-size: 0.95rem;
                margin-bottom: 1rem;
            }
            
            .story-section {
                padding: 0.8rem;
                margin: 1rem 0;
                border-radius: 8px;
            }
            
            .story-label {
                font-size: 0.75rem;
            }
            
            .story-content {
                font-size: 0.9rem;
                line-height: 1.7;
            }
            
            .encounter-section {
                padding: 0.8rem;
                flex-direction: column;
                gap: 5px;
            }
            
            .encounter-icon {
                font-size: 1.2rem;
            }
            
            .guide-section {
                padding-left: 0.8rem;
                margin: 1rem 0;
            }
            
            .guide-text {
                font-size: 0.9rem;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 8px;
            }
            
            .btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 0.9rem;
            }
            
            .history-section {
                margin-top: 1.5rem;
            }
            
            .history-title {
                font-size: 0.85rem;
            }
            
            .history-item {
                padding: 5px 10px;
                font-size: 0.7rem;
            }
            
            .stats {
                position: static;
                text-align: center;
                margin-top: 1rem;
                font-size: 0.7rem;
            }
        }
        
        /* 横屏模式 */
        @media (max-height: 500px) and (orientation: landscape) {
            .jiyuan-page {
                padding: 1rem;
            }
            
            .result-container {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                max-width: 90%;
            }
            
            .result-container > * {
                flex: 1 1 200px;
            }
            
            .fortune-title {
                font-size: 1.2rem;
            }
            
            .action-buttons {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← 返回世间</a>
    
    <div class="particles" id="particles"></div>
    
    <div class="jiyuan-page">
        <div class="loading" id="loading">
            <div class="loading-symbol">缘</div>
            <p style="color: rgba(255,255,255,0.5); margin-top: 1rem;">正在感应你的机缘...</p>
        </div>
        
        <div class="result-container" id="resultContainer" style="display: none;">
            <div class="level-badge" id="levelBadge"></div>
            <h2 class="fortune-title" id="fortuneTitle"></h2>
            <p class="fortune-text" id="fortuneText"></p>
            
            <div class="story-section">
                <div class="story-label">✦ 预言故事</div>
                <p class="story-content" id="storyContent"></p>
            </div>
            
            <div class="encounter-section">
                <span class="encounter-icon">👤</span>
                <div>
                    <div class="encounter-text">你将会遇到</div>
                    <div class="encounter-target" id="encounterTarget"></div>
                </div>
            </div>
            
            <div class="guide-section">
                <div class="guide-label">指引</div>
                <p class="guide-text" id="guideText"></p>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-redraw" onclick="drawAgain()">再求一签</button>
                <button class="btn btn-save" id="saveBtn" onclick="saveFortune()">收藏此签</button>
            </div>
        </div>
        
        <div class="history-section" id="historySection" style="display: none;">
            <div class="history-title">— 今日签缘 —</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>
    
    <div class="stats" id="stats"></div>
    
    <script src="js/fortunes.js"></script>
    <script>
        let currentFortune = null;
        let history = JSON.parse(localStorage.getItem('jiyuanHistory') || '[]');
        let savedFortunes = JSON.parse(localStorage.getItem('savedFortunes') || '[]');
        
        // 创建粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            particlesContainer.appendChild(p);
        }
        
        // 页面加载时自动抽签
        window.onload = function() {
            setTimeout(() => {
                drawFortune();
            }, 1500);
        };
        
        function drawFortune() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            
            setTimeout(() => {
                // 按概率抽签
                const rand = Math.random();
                let filtered;
                
                if (rand < 0.05) filtered = fortunes.filter(f => f.level === '天命');
                else if (rand < 0.20) filtered = fortunes.filter(f => f.level === '上上签');
                else if (rand < 0.60) filtered = fortunes.filter(f => f.level === '中签');
                else if (rand < 0.90) filtered = fortunes.filter(f => f.level === '下签');
                else filtered = fortunes.filter(f => f.level === '劫数');
                
                currentFortune = filtered[Math.floor(Math.random() * filtered.length)];
                displayFortune(currentFortune);
                
                // 添加到历史
                history.unshift({
                    title: currentFortune.title,
                    level: currentFortune.level,
                    time: new Date().toLocaleTimeString()
                });
                if (history.length > 10) history.pop();
                localStorage.setItem('jiyuanHistory', JSON.stringify(history));
                updateHistory();
                updateStats();
                
            }, 1000);
        }
        
        function displayFortune(f) {
            document.getElementById('loading').style.display = 'none';
            const container = document.getElementById('resultContainer');
            
            container.className = 'result-container ' + getLevelClass(f.level);
            document.getElementById('levelBadge').textContent = f.level;
            document.getElementById('fortuneTitle').textContent = f.title;
            document.getElementById('fortuneText').textContent = f.text;
            document.getElementById('storyContent').textContent = f.story;
            document.getElementById('encounterTarget').textContent = f.encounter;
            document.getElementById('guideText').textContent = f.guide;
            
            container.style.display = 'block';
            
            // 检查是否已收藏
            const saveBtn = document.getElementById('saveBtn');
            if (savedFortunes.some(s => s.title === f.title)) {
                saveBtn.className = 'btn btn-saved';
                saveBtn.textContent = '已收藏';
            } else {
                saveBtn.className = 'btn btn-save';
                saveBtn.textContent = '收藏此签';
            }
        }
        
        function getLevelClass(level) {
            const map = {
                '天命': 'tianming',
                '上上签': 'shangshang',
                '中签': 'zhong',
                '下签': 'xia',
                '劫数': 'jieshu'
            };
            return map[level] || 'zhong';
        }
        
        function drawAgain() {
            drawFortune();
        }
        
        function saveFortune() {
            if (!currentFortune) return;
            
            const saveBtn = document.getElementById('saveBtn');
            if (savedFortunes.some(s => s.title === currentFortune.title)) {
                savedFortunes = savedFortunes.filter(s => s.title !== currentFortune.title);
                saveBtn.className = 'btn btn-save';
                saveBtn.textContent = '收藏此签';
            } else {
                savedFortunes.push({
                    ...currentFortune,
                    savedAt: new Date().toLocaleString()
                });
                saveBtn.className = 'btn btn-saved';
                saveBtn.textContent = '已收藏';
            }
            localStorage.setItem('savedFortunes', JSON.stringify(savedFortunes));
        }
        
        function updateHistory() {
            if (history.length === 0) {
                document.getElementById('historySection').style.display = 'none';
                return;
            }
            
            document.getElementById('historySection').style.display = 'block';
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(h => 
                `<span class="history-item ${getLevelClass(h.level)}">${h.title}</span>`
            ).join('');
        }
        
        function updateStats() {
            const today = new Date().toLocaleDateString();
            const todayCount = history.filter(h => {
                return true; // 简化，实际可以按日期筛选
            }).length;
            
            document.getElementById('stats').innerHTML = 
                `今日已抽: ${history.length} 签<br>收藏: ${savedFortunes.length} 签`;
        }
    </script>
</body>
</html>
