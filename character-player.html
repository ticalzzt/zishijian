<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>你 - 觉字机缘 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-black: #0a0908;
            --ancient-gold: #c9a227;
            --dark-red: #8b0000;
            --bronze-light: #d4a84b;
            --bronze-dark: #8b6914;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 9, 8, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--ancient-gold);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: background 0.3s;
        }
        
        .top-nav.scrolled {
            background: rgba(10, 9, 8, 0.95);
        }
        
        .back-btn, .nav-link {
            color: var(--ancient-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .back-btn { border-color: rgba(201, 162, 39, 0.4); }
        
        .back-btn:hover, .nav-link:hover {
            color: var(--bronze-light);
            text-shadow: 0 0 10px rgba(201, 162, 39, 0.8);
        }
        
        /* 全屏人物封面 */
        .hero-cover {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--ink-black);
        }
        
        .hero-cover img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* 横屏时用cover填充 */
        @media (orientation: landscape) {
            .hero-cover img {
                object-fit: cover;
            }
        }
        
        .hero-cover::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(transparent, var(--ink-black));
            z-index: 1;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            animation: bounce 2s infinite;
        }
        
        .scroll-arrow {
            width: 24px;
            height: 24px;
            border-right: 2px solid var(--ancient-gold);
            border-bottom: 2px solid var(--ancient-gold);
            transform: rotate(45deg);
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }
        
        /* 内容区域 */
        .content-section {
            background: var(--ink-black);
            padding: 3rem 1.5rem;
            min-height: 100vh;
        }
        
        .content-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1, h2, h3 { font-family: 'ZCOOL XiaoWei', serif; }
        
        .char-section {
            border: 2px solid var(--ancient-gold);
            background: rgba(20, 18, 15, 0.8);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .char-section h2 {
            color: var(--ancient-gold);
            border-bottom: 1px solid var(--ancient-gold);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .section-content p {
            color: #d4c8b5;
            line-height: 1.9;
            margin-bottom: 1rem;
        }
        
        .traits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }
        
        .trait-item {
            background: rgba(30, 25, 20, 0.7);
            border: 1px solid var(--bronze-dark);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .trait-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bronze-dark), var(--ancient-gold));
            color: var(--ink-black);
            font-weight: bold;
        }
        
        .trait-text { color: #e8dcc8; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .top-nav { padding: 0.5rem 1rem; gap: 0.8rem; }
            .nav-link { font-size: 0.85rem; }
            .content-section { padding: 2rem 1rem; }
            .traits-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="top-nav" id="topNav">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <a href="timeline.html" class="nav-link">世界时间线</a>
        <a href="enhanced-creator.html" class="nav-link">身份创建器</a>
    </nav>

    <!-- 全屏人物封面 -->
    <section class="hero-cover">
        <img src="images/player_full.jpg" alt="角色选择">
        <div class="scroll-hint">
            <div class="scroll-arrow"></div>
        </div>
    </section>

    <!-- 下滑内容区域 -->
    <section class="content-section">
        <div class="content-container">
            <div class="char-section">
                <h2>卷一 背景故事</h2>
                <div class="section-content">
                    <p>你，只是一个普通人。来自地球，过着平凡的生活。没有显赫的身世，没有特殊的背景，每天为生活奔波，为琐事烦恼。</p>
                    <p>直到那一天，一切都变了。</p>
                    <p>当你的意识再次清明时，你发现自己盘坐在石阶之上。四周云雾缭绕，仙气氤氲。面前，是漫天仙佛的虚影；身后，是一个熟悉的背影——那是孙悟空，但他没有回头。</p>
                    <p>"师弟，你终于来了。"</p>
                </div>
            </div>

            <div class="char-section">
                <h2>卷二 性格特点</h2>
                <div class="traits-grid">
                    <div class="trait-item">
                        <span class="trait-icon">新</span>
                        <span class="trait-text">现代思维 - 拥有超越时代的认知</span>
                    </div>
                    <div class="trait-item">
                        <span class="trait-icon">韧</span>
                        <span class="trait-text">坚韧不拔 - 面对困境绝不放弃</span>
                    </div>
                    <div class="trait-item">
                        <span class="trait-icon">探</span>
                        <span class="trait-text">求知若渴 - 对未知充满好奇</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function goBack() {
            window.history.back() || (window.location.href = 'index.html');
        }
        
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('topNav');
            if (window.scrollY > 100) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
