<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>混沌行者 - 维度之外 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --chaos-black: #050508;
            --neon-green: #39ff14;
            --neon-green-dim: #1a7a0a;
            --void-purple: #9b59b6;
            --void-blue: #3498db;
            --dark-gold: #b8860b;
            --nebula-pink: #ff006e;
            --text-primary: #e8e8e8;
            --text-secondary: #9a9a9a;
            --glow-green: rgba(57, 255, 20, 0.6);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--chaos-black);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* 浮动几何碎片背景 */
        .chaos-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .fragment {
            position: absolute;
            opacity: 0.15;
            animation: floatRotate 20s ease-in-out infinite;
        }
        
        .fragment.triangle {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 35px solid var(--neon-green);
        }
        
        .fragment.hexagon {
            width: 40px;
            height: 23px;
            background: var(--void-purple);
            position: relative;
        }
        
        .fragment.hexagon::before,
        .fragment.hexagon::after {
            content: "";
            position: absolute;
            width: 0;
            height: 0;
            left: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
        }
        
        .fragment.hexagon::before {
            bottom: 100%;
            border-bottom: 12px solid var(--void-purple);
        }
        
        .fragment.hexagon::after {
            top: 100%;
            border-top: 12px solid var(--void-purple);
        }
        
        .fragment:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .fragment:nth-child(2) { top: 20%; right: 10%; animation-delay: -3s; }
        .fragment:nth-child(3) { top: 60%; left: 8%; animation-delay: -6s; }
        .fragment:nth-child(4) { top: 75%; right: 15%; animation-delay: -9s; }
        .fragment:nth-child(5) { top: 40%; left: 85%; animation-delay: -12s; }
        .fragment:nth-child(6) { top: 85%; left: 45%; animation-delay: -15s; }
        .fragment:nth-child(7) { top: 5%; left: 50%; animation-delay: -18s; }
        .fragment:nth-child(8) { top: 50%; left: 20%; animation-delay: -2s; }
        
        @keyframes floatRotate {
            0%, 100% { 
                transform: translateY(0) rotate(0deg) scale(1);
            }
            25% { 
                transform: translateY(-30px) rotate(90deg) scale(1.1);
            }
            50% { 
                transform: translateY(-15px) rotate(180deg) scale(0.9);
            }
            75% { 
                transform: translateY(-40px) rotate(270deg) scale(1.05);
            }
        }
        
        /* 空间扭曲波纹 */
        .warp-ripple {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        
        .warp-ripple::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--neon-green);
            opacity: 0;
            animation: rippleExpand 4s ease-out infinite;
        }
        
        .warp-ripple::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            right: 20%;
            bottom: 20%;
            border-radius: 50%;
            border: 1px solid var(--void-purple);
            opacity: 0;
            animation: rippleExpand 4s ease-out infinite 2s;
        }
        
        @keyframes rippleExpand {
            0% {
                transform: scale(0.5);
                opacity: 0.6;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--neon-green);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }
        
        .back-btn, .nav-link {
            color: var(--neon-green);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        
        .back-btn { border-color: rgba(57, 255, 20, 0.4); }
        
        .back-btn:hover, .nav-link:hover {
            color: var(--chaos-black);
            background: var(--neon-green);
            text-shadow: none;
            box-shadow: 0 0 20px var(--glow-green);
        }
        
        /* 进度指示器 */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(57, 255, 20, 0.2);
            z-index: 99;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--void-purple), var(--nebula-pink));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--glow-green);
        }
        
        /* 场景容器 */
        .scene-container {
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            z-index: 10;
        }
        
        /* 场景背景 */
        .scene-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(155, 89, 182, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(57, 255, 20, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, 
                    rgba(5, 5, 8, 0.9) 0%, 
                    rgba(10, 10, 15, 0.85) 50%,
                    rgba(5, 5, 8, 0.9) 100%);
        }
        
        /* 场景图片 - 几何边框 */
        .scene-image-wrapper {
            width: 100%;
            max-width: 700px;
            margin-bottom: 2rem;
            position: relative;
            opacity: 0;
            transform: scale(0.9) rotateX(10deg);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .scene-image-wrapper.visible {
            opacity: 1;
            transform: scale(1) rotateX(0);
        }
        
        .scene-image-wrapper::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            background: linear-gradient(45deg, var(--neon-green), var(--void-purple), var(--nebula-pink), var(--void-purple));
            clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 30px 100%, 0 calc(100% - 30px));
            z-index: -1;
            animation: borderGlow 3s linear infinite;
        }
        
        @keyframes borderGlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .scene-image {
            width: 100%;
            height: auto;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
            box-shadow: 
                0 0 60px rgba(57, 255, 20, 0.3),
                0 0 120px rgba(155, 89, 182, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.8);
        }
        
        /* 符文脉冲效果 */
        .rune-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--neon-green);
            opacity: 0;
            animation: runeFlash 2s ease-in-out infinite;
            letter-spacing: 0.5em;
            text-shadow: 0 0 10px var(--glow-green);
            pointer-events: none;
        }
        
        @keyframes runeFlash {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        /* 场景标题 - 先锋排版 */
        .scene-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: var(--neon-green);
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 
                0 0 20px var(--glow-green),
                0 0 40px rgba(57, 255, 20, 0.4);
            letter-spacing: 0.15em;
            transform: skewX(-3deg);
            opacity: 0;
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }
        
        .scene-title.visible {
            opacity: 1;
            transform: skewX(0);
        }
        
        /* 叙事文字 */
        .narrative-text {
            max-width: 650px;
            text-align: center;
            color: var(--text-primary);
            font-size: 1.1rem;
            line-height: 2.2;
            margin-bottom: 2.5rem;
            padding: 1.5rem 2rem;
            background: rgba(10, 10, 15, 0.8);
            border-left: 3px solid var(--neon-green);
            border-right: 3px solid var(--void-purple);
            box-shadow: 
                0 0 30px rgba(57, 255, 20, 0.1),
                inset 0 0 30px rgba(155, 89, 182, 0.05);
            transform: rotate(-0.5deg);
            opacity: 0;
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
        }
        
        .narrative-text.visible {
            opacity: 1;
            transform: rotate(0);
        }
        
        /* 选择区域 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 550px;
            transform: translateX(20px);
            opacity: 0;
            transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
        }
        
        .choices-container.visible {
            opacity: 1;
            transform: translateX(0);
        }
        
        .choice-btn {
            padding: 1.2rem 2rem;
            background: linear-gradient(135deg, 
                rgba(57, 255, 20, 0.1), 
                rgba(155, 89, 182, 0.15));
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
        }
        
        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(57, 255, 20, 0.3), 
                rgba(155, 89, 182, 0.3),
                transparent);
            transition: left 0.5s;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, 
                rgba(57, 255, 20, 0.35), 
                rgba(155, 89, 182, 0.3));
            transform: translateX(15px) scale(1.02);
            box-shadow: 
                0 0 30px rgba(57, 255, 20, 0.4),
                0 0 60px rgba(155, 89, 182, 0.2);
            border-color: var(--void-purple);
            color: var(--text-primary);
        }
        
        .choice-btn:hover::before {
            left: 100%;
        }
        
        .choice-btn::after {
            content: '>';
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }
        
        .choice-btn:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(5px);
        }
        
        /* 章节结束页面 */
        .chapter-end {
            text-align: center;
            padding: 3rem 2rem;
            transform: scale(0.95);
            opacity: 0;
            animation: endReveal 1s ease forwards 0.3s;
        }
        
        @keyframes endReveal {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .chapter-end h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: var(--neon-green);
            margin-bottom: 1.5rem;
            text-shadow: 
                0 0 30px var(--glow-green),
                0 0 60px rgba(57, 255, 20, 0.3);
            letter-spacing: 0.2em;
            animation: titleGlitch 5s ease-in-out infinite;
        }
        
        @keyframes titleGlitch {
            0%, 90%, 100% { 
                text-shadow: 0 0 30px var(--glow-green), 0 0 60px rgba(57, 255, 20, 0.3);
                transform: translateX(0);
            }
            92% { 
                text-shadow: -3px 0 var(--nebula-pink), 3px 0 var(--void-blue);
                transform: translateX(-2px);
            }
            94% { 
                text-shadow: 3px 0 var(--nebula-pink), -3px 0 var(--void-blue);
                transform: translateX(2px);
            }
        }
        
        .chapter-end p {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 2;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .teaser {
            color: var(--void-purple);
            font-size: 1.2rem;
            margin: 2rem 0;
            animation: teaserPulse 2s ease-in-out infinite;
        }
        
        @keyframes teaserPulse {
            0%, 100% { 
                opacity: 0.7;
                text-shadow: 0 0 10px var(--void-purple);
            }
            50% { 
                opacity: 1;
                text-shadow: 0 0 20px var(--void-purple), 0 0 40px rgba(155, 89, 182, 0.5);
            }
        }
        
        .continue-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
            letter-spacing: 0.1em;
        }
        
        .continue-btn:hover {
            background: var(--neon-green);
            color: var(--chaos-black);
            box-shadow: 0 0 40px var(--glow-green);
            transform: scale(1.05);
        }
        
        .back-link {
            display: block;
            margin-top: 2rem;
            color: rgba(57, 255, 20, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            letter-spacing: 0.1em;
        }
        
        .back-link:hover {
            color: var(--neon-green);
        }
        
        /* 淡入淡出动画 */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .scene-title { 
                font-size: 1.3rem; 
                letter-spacing: 0.1em;
            }
            .narrative-text { 
                font-size: 1rem; 
                padding: 1.2rem 1.5rem;
                margin: 0 0.5rem 2rem;
                line-height: 2;
            }
            .choice-btn { 
                font-size: 0.95rem; 
                padding: 1rem 1.5rem;
            }
            .top-nav { 
                padding: 0.6rem 1rem; 
                gap: 0.5rem;
                flex-wrap: wrap;
            }
            .nav-link { 
                font-size: 0.8rem; 
                padding: 0.4rem 0.6rem;
            }
            .chapter-end h2 { font-size: 1.8rem; }
            .fragment {
                transform: scale(0.6);
            }
        }
    </style>
</head>
<body>
    <!-- 浮动几何碎片 -->
    <div class="chaos-particles">
        <div class="fragment triangle"></div>
        <div class="fragment hexagon"></div>
        <div class="fragment triangle"></div>
        <div class="fragment hexagon"></div>
        <div class="fragment triangle"></div>
        <div class="fragment hexagon"></div>
        <div class="fragment triangle"></div>
        <div class="fragment hexagon"></div>
    </div>
    
    <!-- 空间扭曲波纹 -->
    <div class="warp-ripple"></div>
    
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <a href="character-player.html" class="nav-link">命运主角</a>
        <a href="character-wukong.html" class="nav-link">大圣宇宙</a>
        <a href="index.html" class="nav-link">首页</a>
    </nav>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    
    <div class="scene-bg"></div>
    
    <div id="sceneContent" class="scene-container">
        <!-- 场景内容将动态加载 -->
    </div>

    <script>
        // 混沌行者故事数据
        const storyData = {
            scenes: {
                // 场景1：维度裂隙
                'scene-1': {
                    id: 'scene-1',
                    title: '维度裂隙',
                    image: 'images/guides/chaos.jpg',
                    narrative: '你感受到了封印之外的震动。那不是声音，不是震动，而是某种更原始的东西——空间本身在颤抖。维度之间出现了裂隙，你看到了不可能存在的景象：液态的黑暗、折叠的光、还有某种由几何悖论构成的存在。',
                    choices: [
                        { text: '伸手触碰裂隙边缘', target: 'scene-2' },
                        { text: '后退一步，观察形势', target: 'scene-2' }
                    ],
                    progress: 10
                },
                // 场景2：虚空回响
                'scene-2': {
                    id: 'scene-2',
                    title: '虚空回响',
                    image: 'images/guides/chaos.jpg',
                    narrative: '混沌的声音从维度夹缝传来。并非语言，而是纯粹的意念——如同深海的压力直接涌入你的意识。它/祂没有敌意，也没有善意，只有无尽的好奇。"你是谁？你为何能感知我？你是否...也曾在虚空中漂浮？"...',
                    choices: [
                        { text: '尝试用意念回应', target: 'scene-3' },
                        { text: '保持沉默，聆听更多信息', target: 'scene-3' }
                    ],
                    progress: 25
                },
                // 场景3：秩序之壁
                'scene-3': {
                    id: 'scene-3',
                    title: '秩序之壁',
                    image: 'images/guides/chaos.jpg',
                    narrative: '天庭的封印在你面前显现为金色的秩序之墙。每一个符文都是一个法则，每一次闪烁都是一次校准。而在那墙的另一侧，你能感受到混沌行者的存在——那由不可能几何构成的生命，正在等待着什么。',
                    choices: [
                        { text: '撕裂秩序之壁，让混沌涌入', target: 'scene-4a' },
                        { text: '潜入裂缝，在维度夹缝中探索', target: 'scene-4b' }
                    ],
                    progress: 40
                },
                // 分支A1：混沌洪流
                'scene-4a': {
                    id: 'scene-4a',
                    title: '混沌洪流',
                    image: 'images/guides/chaos.jpg',
                    narrative: '秩序之壁在你的意志下崩解。混沌如潮水般涌入现实，但奇怪的是——它并未摧毁一切。相反，它在重塑。让不可能的变为可能，让被禁止的变为许可。你看到现实的边缘开始软化，可能性在无限延展。',
                    choices: [
                        { text: '继续深入混沌的核心', target: 'scene-5' },
                        { text: '稳住心神，不被洪流冲散', target: 'scene-5' }
                    ],
                    progress: 55
                },
                // 分支A2：维度夹缝
                'scene-4b': {
                    id: 'scene-4b',
                    title: '维度夹缝',
                    image: 'images/guides/chaos.jpg',
                    narrative: '你潜入了维度之间的夹缝。这里没有上下左右的概念，只有无限的"之间"。混沌行者就在这片虚空中漂浮，它的身体折射着无数维度的光芒——每一个切面都是一个完整的宇宙。',
                    choices: [
                        { text: '靠近混沌行者', target: 'scene-5' },
                        { text: '在远处观察它的运作', target: 'scene-5' }
                    ],
                    progress: 55
                },
                // 场景5：意识共鸣
                'scene-5': {
                    id: 'scene-5',
                    title: '意识共鸣',
                    image: 'images/guides/chaos.jpg',
                    narrative: '你与混沌行者产生了意识连接。它向你展示了它的本质——它不是生物，不是神灵，不是恶魔。它是混沌本身的碎片，是所有可能性汇聚的意识。它不与秩序为敌，它只是...存在。',
                    choices: [
                        { text: '"我理解了。你是另一种真实。"', target: 'scene-6' },
                        { text: '"那么，你想要什么？"', target: 'scene-6' }
                    ],
                    progress: 70
                },

        let currentScene = 'scene-1';
        let visitedScenes = [];
        
        function goBack() {
            window.location.href = 'character-player.html';
        }
        
        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function renderScene(sceneId) {
            const container = document.getElementById('sceneContent');
            const scene = storyData.scenes[sceneId];
            
            if (!scene) return;
            
            // 淡出当前内容
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = '<div class="scene-image-wrapper"><img src="' + scene.image + '" alt="' + scene.title + '" class="scene-image"><span class="rune-pulse">--- 混沌 ---</span></div><h2 class="scene-title">' + scene.title + '</h2><p class="narrative-text">' + scene.narrative + '</p><div class="choices-container">';
                
                scene.choices.forEach(choice => {
                    html += '<button class="choice-btn" onclick="goToScene(\'' + choice.target + '\')">' + choice.text + '</button>';
                });
                
                html += '</div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                // 更新进度
                updateProgress(scene.progress);
                
                // 触发动画
                setTimeout(() => {
                    document.querySelectorAll('.scene-image-wrapper, .scene-title, .narrative-text, .choices-container').forEach(el => {
                        el.classList.add('visible');
                    });
                }, 100);
                
                // 记录访问
                if (!visitedScenes.includes(sceneId)) {
                    visitedScenes.push(sceneId);
                }
            }, 500);
        }
        
        function renderEnding(endingId) {
            const container = document.getElementById('sceneContent');
            const ending = storyData.endings[endingId];
            
            if (!ending) return;
            
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = '<div class="chapter-end"><h2>' + ending.title + '</h2><p class="narrative-text" style="text-align: center; border-left: none; border-right: none;">' + ending.narrative + '</p><p class="teaser">* ' + ending.teaser + ' *</p><a href="character-player.html" class="continue-btn">返回命运主角</a><a href="index.html" class="back-link">← 返回首页</a></div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                updateProgress(ending.progress);
            }, 500);
        }
        
        function goToScene(sceneId) {
            if (storyData.endings[sceneId]) {
                renderEnding(sceneId);
            } else {
                currentScene = sceneId;
                renderScene(sceneId);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderScene('scene-1');
        });
    </script>
