<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>我是凯尔 - 命运引导者 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-black: #0a0908;
            --star-silver: #c0c8d0;
            --warm-gold: #d4a84b;
            --soft-gold: #f0d890;
            --deep-space: #1a1a2e;
            --twilight: #2d2d44;
            --text-primary: #e8e6e0;
            --text-secondary: #a0a0a8;
            --glow-gold: rgba(212, 168, 75, 0.5);
            --glow-silver: rgba(192, 200, 208, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 9, 8, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--warm-gold);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(212, 168, 75, 0.15);
        }
        
        .back-btn, .nav-link {
            color: var(--warm-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            border-radius: 4px;
        }
        
        .back-btn { border-color: rgba(212, 168, 75, 0.4); }
        
        .back-btn:hover, .nav-link:hover {
            color: var(--soft-gold);
            text-shadow: 0 0 15px var(--glow-gold);
            border-color: var(--warm-gold);
            background: rgba(212, 168, 75, 0.1);
        }
        
        /* 进度条 */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(212, 168, 75, 0.15);
            z-index: 99;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--warm-gold), var(--soft-gold));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--glow-gold);
        }
        
        /* 星尘粒子 */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--star-silver);
            border-radius: 50%;
            opacity: 0.4;
            animation: floatDown linear infinite;
        }
        
        @keyframes floatDown {
            0% {
                transform: translateY(-10vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(110vh) translateX(20px);
                opacity: 0;
            }
        }
        
        /* 场景容器 */
        .scene-container {
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            z-index: 10;
        }
        
        /* 场景背景 */
        .scene-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: radial-gradient(ellipse at center, var(--deep-space) 0%, var(--ink-black) 70%);
        }
        
        /* 场景图片 */
        .scene-image-wrapper {
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .scene-image-wrapper.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .scene-image {
            width: 100%;
            height: auto;
            border-radius: 50%;
            border: 3px solid var(--warm-gold);
            box-shadow: 
                0 0 60px var(--glow-gold),
                0 0 120px rgba(212, 168, 75, 0.2),
                inset 0 0 40px rgba(0, 0, 0, 0.6);
        }
        
        /* 场景标题 */
        .scene-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.6rem;
            color: var(--soft-gold);
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px var(--glow-gold);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }
        
        .scene-title.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 叙事文字 */
        .narrative-text {
            max-width: 650px;
            text-align: center;
            color: var(--text-primary);
            font-size: 1.15rem;
            line-height: 2.2;
            margin-bottom: 2.5rem;
            padding: 2rem 2.5rem;
            background: rgba(30, 30, 50, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(212, 168, 75, 0.2);
            box-shadow: 0 0 40px rgba(212, 168, 75, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
        }
        
        .narrative-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .narrative-text em {
            color: var(--soft-gold);
            font-style: normal;
            font-weight: 600;
        }
        
        /* 选择区域 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 550px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
        }
        
        .choices-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .choice-btn {
            padding: 1.3rem 2rem;
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.1), 
                rgba(192, 200, 208, 0.05));
            border: 2px solid var(--warm-gold);
            color: var(--soft-gold);
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05rem;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        
        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(212, 168, 75, 0.15), 
                transparent);
            transition: left 0.5s;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.25), 
                rgba(192, 200, 208, 0.15));
            transform: translateX(10px);
            box-shadow: 0 0 30px var(--glow-gold);
            border-color: var(--soft-gold);
            color: #fff;
        }
        
        .choice-btn:hover::before {
            left: 100%;
        }
        
        /* 结局页面 */
        .ending-container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 700px;
        }
        
        .ending-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--soft-gold);
            margin-bottom: 2rem;
            text-shadow: 0 0 30px var(--glow-gold);
        }
        
        .ending-text {
            font-size: 1.2rem;
            line-height: 2.2;
            color: var(--text-primary);
            margin-bottom: 2.5rem;
        }
        
        .ending-signature {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--warm-gold);
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(212, 168, 75, 0.3);
        }
        
        .ending-signature span {
            display: block;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 400;
        }
        
        .continue-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.2), 
                rgba(192, 200, 208, 0.1));
            border: 2px solid var(--warm-gold);
            color: var(--soft-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.1rem;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 2rem;
        }
        
        .continue-btn:hover {
            background: linear-gradient(135deg, 
                rgba(212, 168, 75, 0.4), 
                rgba(192, 200, 208, 0.2));
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--glow-gold);
        }
        
        .back-link {
            display: block;
            margin-top: 2rem;
            color: rgba(212, 168, 75, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--warm-gold);
        }
        
        /* 淡入淡出 */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .scene-title { font-size: 1.4rem; }
            .narrative-text { 
                font-size: 1rem; 
                padding: 1.5rem 1.8rem;
                margin: 0 0.5rem 2rem;
            }
            .choice-btn { 
                font-size: 0.95rem; 
                padding: 1.1rem 1.5rem;
            }
            .scene-image {
                max-width: 280px;
            }
            .top-nav { 
                padding: 0.6rem 1rem; 
                gap: 0.8rem;
                flex-wrap: wrap;
            }
            .nav-link { 
                font-size: 0.85rem; 
                padding: 0.4rem 0.7rem;
            }
            .ending-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        <a href="character-player.html" class="nav-link">角色介绍</a>
        <a href="index.html" class="nav-link">首页</a>
    </nav>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    
    <div class="particles-container" id="particles"></div>
    
    <div class="scene-bg"></div>
    
    <div id="sceneContent" class="scene-container">
        <!-- 场景内容将动态加载 -->
    </div>

    <script>
        // 创建星尘粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (15 + Math.random() * 20) + 's';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.width = (2 + Math.random() * 3) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        
        // 故事数据 - Kael的故事
        const storyData = {
            scenes: {
                'scene-1': {
                    id: 'scene-1',
                    title: '一 · 门外',
                    image: 'images/guides/kael.jpg',
                    narrative: '你站在所有宇宙的门外。<br><br>身后是虚无，身前是无尽。每一扇门后面，都有一个世界在运转——有人在哭，有人在笑，有人在追寻，有人在等待。<br><br>你听到门后传来的声音，像是隔了很多很多的水。但你依然能分辨出那些声音里的期盼。<br><br>你知道，只要你愿意，你可以推开任何一扇门。',
                    choices: [
                        { text: '走向最近的那扇门', target: 'scene-2' }
                    ],
                    progress: 12
                },
                'scene-2': {
                    id: 'scene-2',
                    title: '二 · 第一个呼唤',
                    image: 'images/guides/kael.jpg',
                    narrative: '你的指尖触碰到门的那一刻，一股温热从掌心传来。<br><br>那是一个孩子的声音，她在喊：「有人吗？有没有人能听见我？」<br><br>她的世界里，天塌了。她不知道该向谁求救。而你，是她能触及到的，唯一的存在。<br><br>你感受到她的恐惧，也感受到她的坚强。你知道，只要你打开门，就能改变她的命运。',
                    choices: [
                        { text: '打开门，走进去', target: 'scene-4a' },
                        { text: '不打开门，但把手留在门上', target: 'scene-4b' }
                    ],
                    progress: 37
                },
                'scene-4a': {
                    id: 'scene-4a',
                    title: '三 · 打开',
                    image: 'images/guides/kael.jpg',
                    narrative: '门开了。<br><br>你走进去，成为那个孩子世界里，第一道光。你没有拯救她——你只是告诉她：「你不是一个人。」<br><br>有时候，一句话就足够。<br><br>你离开那扇门，继续向前。但你开始明白，<em>门后的故事，是值得被看见的</em>。',
                    choices: [
                        { text: '继续走下去', target: 'scene-5' }
                    ],
                    progress: 50
                },
                'scene-4b': {
                    id: 'scene-4b',
                    title: '三 · 倾听',
                    image: 'images/guides/kael.jpg',
                    narrative: '你没有打开门。<br><br>但你把手留在门上，感受着门后那个世界的震动。你听到她的哭声渐渐平息，听到她开始自言自语给自己打气，听到她一步一步站起来的声音。<br><br>你没有介入她的故事。你只是<em>见证</em>。<br><br>有时候，一个人的力量，来自于知道自己被某个存在注视着。哪怕那个存在从未现身。',
                    choices: [
                        { text: '继续走下去', target: 'scene-5' }
                    ],
                    progress: 50
                },
                'scene-5': {
                    id: 'scene-5',
                    title: '四 · 回响',
                    image: 'images/guides/kael.jpg',
                    narrative: '走过很多门之后，你开始明白一件事：<br><br>每一扇门后面，都有一个灵魂在呼喊。而你的存在本身，就是对那些呼喊的回应。<br><br>门开始因你而松动。不是因为你做了什么，而是因为<em>有人在门外观望</em>这件事本身，就让门后的生命有了勇气。',
                    choices: [
                        { text: '继续', target: 'scene-6' }
                    ],
                    progress: 62
                },
                'scene-6': {
                    id: 'scene-6',
                    title: '五 · 选择',
                    image: 'images/guides/kael.jpg',
                    narrative: '终于，你站在了最后一扇门前。<br><br>这扇门通向「现在」——你来的地方。但同时，你也可以选择不回去。你可以选择永远站在门与门之间，成为一座桥。<br><br>一道选择题出现在你面前：<br><br><em>记住每一扇门后的故事</em>——那意味着你要承载所有生命的重量。<br><br><em>记住每一扇门前的期待</em>——那意味着你永远站在希望的这一侧。',
                    choices: [
                        { text: '记住门后的故事', target: 'ending-library' },
                        { text: '记住门前的期待', target: 'ending-guide' }
                    ],
                    progress: 75
                }
            },
            endings: {
                'ending-library': {
                    title: '六 · 万界书库',
                    narrative: '你选择成为记录者。<br><br>每一个你曾触碰过的门，都在你心中留下了一道光痕。那是无数生命的片段——他们的哭泣，他们的微笑，他们在最黑暗时刻发出的光。<br><br>你成了万界书库的守护者。那里存放着所有宇宙所有故事的第一页。不是结局，只是开始。<br><br>因为你知道，每一个故事，最动人的时刻，永远是开头——<em>当一个人还不知道自己将走向何方，却依然选择迈出第一步的时候</em>。',
                    signature: '我是凯尔。<span>万界书库的守夜人。</span>',
                    progress: 100
                },
                'ending-guide': {
                    title: '六 · 引路人',
                    narrative: '你选择成为引路人。<br><br>你不再踏入任何一扇门。你只是站在门外，让门后的生命知道——外面有人在等待他们。<br><br>有人终将推开那扇门。而当他们走出来的时候，第一眼看到的，是你。<br><br>你成为所有主角遇见的第一人。不是导师，不是救世主，只是一个<em>比他们早到了一会儿的人</em>，在那里说一句：「欢迎。我等你很久了。」',
                    signature: '我是凯尔。<span>所有故事的引路人。</span>',
                    progress: 100
                }
            }
        };
        
        let currentScene = 'scene-1';
        
        function goBack() {
            window.location.href = 'character-player.html';
        }
        
        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function renderScene(sceneId) {
            const container = document.getElementById('sceneContent');
            const scene = storyData.scenes[sceneId];
            
            if (!scene) return;
            
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = '<div class="scene-image-wrapper"><img src="' + scene.image + '" alt="' + scene.title + '" class="scene-image"></div><h2 class="scene-title">' + scene.title + '</h2><p class="narrative-text">' + scene.narrative + '</p><div class="choices-container">';
                
                scene.choices.forEach(choice => {
                    html += '<button class="choice-btn" onclick="goToScene(\'' + choice.target + '\')">' + choice.text + '</button>';
                });
                
                html += '</div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                updateProgress(scene.progress);
                
                setTimeout(() => {
                    document.querySelectorAll('.scene-image-wrapper, .scene-title, .narrative-text, .choices-container').forEach(el => {
                        el.classList.add('visible');
                    });
                }, 100);
            }, 500);
        }
        
        function renderEnding(endingId) {
            const container = document.getElementById('sceneContent');
            const ending = storyData.endings[endingId];
            
            if (!ending) return;
            
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = '<div class="ending-container"><h2 class="ending-title">' + ending.title + '</h2><p class="ending-text">' + ending.narrative + '</p><div class="ending-signature">' + ending.signature + '</div><a href="character-player.html" class="continue-btn">返回角色介绍</a><a href="index.html" class="back-link">← 返回首页</a></div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                updateProgress(ending.progress);
            }, 500);
        }
        
        function goToScene(sceneId) {
            if (sceneId.startsWith('ending-')) {
                renderEnding(sceneId);
            } else {
                currentScene = sceneId;
                renderScene(sceneId);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            renderScene('scene-1');
        });
    </script>
</body>
</html>
