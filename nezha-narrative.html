<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>三太子 · 莲花劫 | 藏子世间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-red: #c41e3a;
            --fire-orange: #ff6b35;
            --fire-gold: #ffd700;
            --lotus-pink: #ff69b4;
            --lotus-white: #fff5f5;
            --ember: #8b0000;
            --dark-bg: rgba(20, 10, 15, 0.98);
            --ink-black: #0a0508;
            --text-primary: #ffe4e1;
            --text-secondary: #d4a5a5;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--ink-black);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(20, 10, 15, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--fire-red);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.3);
        }
        
        .back-btn, .nav-link {
            color: var(--fire-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            border-radius: 4px;
        }
        
        .back-btn { border-color: rgba(255, 215, 0, 0.4); }
        
        .back-btn:hover, .nav-link:hover {
            color: var(--fire-orange);
            text-shadow: 0 0 15px rgba(255, 107, 53, 0.8);
            border-color: var(--fire-orange);
            background: rgba(255, 107, 53, 0.1);
        }
        
        /* 进度指示器 */
        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(196, 30, 58, 0.2);
            z-index: 99;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--fire-red), var(--fire-gold));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }
        
        /* 场景容器 */
        .scene-container {
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }
        
        /* 场景背景 - 火焰渐变 */
        .scene-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: linear-gradient(180deg, 
                rgba(20, 10, 15, 0.9) 0%, 
                rgba(40, 15, 20, 0.85) 50%,
                rgba(20, 10, 15, 0.9) 100%);
        }
        
        /* 火焰粒子效果 */
        .fire-particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, var(--fire-orange), transparent);
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }
        
        /* 莲花花瓣飘落 */
        .lotus-petals {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .petal {
            position: absolute;
            width: 12px;
            height: 18px;
            background: linear-gradient(135deg, var(--lotus-pink), var(--lotus-white));
            border-radius: 50% 50% 50% 0;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(100vh) rotate(360deg) translateX(50px);
                opacity: 0;
            }
        }
        
        /* 角色图 */
        .character-display {
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .character-display.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .character-image {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 
                0 0 60px rgba(196, 30, 58, 0.4),
                0 0 120px rgba(255, 107, 53, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.6);
            border: 3px solid var(--fire-red);
        }
        
        /* 角色光晕 */
        .character-display::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse at center, 
                rgba(255, 107, 53, 0.3) 0%, 
                transparent 60%);
            z-index: -1;
            animation: pulseGlow 3s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { 
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }
        
        /* 场景标题 */
        .scene-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.8rem;
            color: var(--fire-gold);
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }
        
        .scene-title.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 叙事文字 */
        .narrative-text {
            max-width: 650px;
            text-align: center;
            color: var(--text-primary);
            font-size: 1.15rem;
            line-height: 2;
            margin-bottom: 2.5rem;
            padding: 1.5rem 2rem;
            background: rgba(40, 15, 20, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(196, 30, 58, 0.3);
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.15);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
        }
        
        .narrative-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 选择区域 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s;
        }
        
        .choices-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .choice-btn {
            padding: 1.2rem 2rem;
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.2), 
                rgba(255, 107, 53, 0.15));
            border: 2px solid var(--fire-red);
            color: var(--fire-gold);
            font-family: 'Noto Serif SC', serif;
            font-size: 1.05rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        
        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 215, 0, 0.2), 
                transparent);
            transition: left 0.5s;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.45), 
                rgba(255, 107, 53, 0.35));
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
            border-color: var(--fire-gold);
            color: var(--fire-orange);
        }
        
        .choice-btn:hover::before {
            left: 100%;
        }
        
        /* 章节结束页面 */
        .chapter-end {
            text-align: center;
            padding: 3rem 2rem;
        }
        
        .chapter-end h2 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--fire-gold);
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }
        
        .chapter-end p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        .continue-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.4), 
                rgba(255, 107, 53, 0.3));
            border: 2px solid var(--fire-gold);
            color: var(--fire-gold);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.2rem;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .continue-btn:hover {
            background: linear-gradient(135deg, 
                rgba(196, 30, 58, 0.6), 
                rgba(255, 107, 53, 0.5));
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 107, 53, 0.5);
        }
        
        .back-link {
            display: block;
            margin-top: 2rem;
            color: rgba(255, 215, 0, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--fire-gold);
        }
        
        /* 淡入淡出动画 */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .scene-title { font-size: 1.5rem; }
            .narrative-text { 
                font-size: 1rem; 
                padding: 1.2rem 1.5rem;
                margin: 0 1rem 2rem;
            }
            .choice-btn { 
                font-size: 0.95rem; 
                padding: 1rem 1.5rem;
            }
            .top-nav { 
                padding: 0.6rem 1rem; 
                gap: 0.8rem;
                flex-wrap: wrap;
            }
            .nav-link { 
                font-size: 0.85rem; 
                padding: 0.4rem 0.7rem;
            }
            .chapter-end h2 { font-size: 2rem; }
            .character-image {
                border-width: 2px;
            }
        }
    </style>
</head>

    <script>
        // 创建火焰粒子
        function createFireParticles() {
            const container = document.getElementById('fireParticles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        
        // 创建莲花花瓣
        function createLotusPetals() {
            const container = document.getElementById('lotusPetals');
            for (let i = 0; i < 15; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (Math.random() * 8 + 6) + 's';
                petal.style.animationDelay = (Math.random() * 15) + 's';
                petal.style.opacity = Math.random() * 0.4 + 0.2;
                petal.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(petal);
            }
        }

                'scene-8b': {
                    id: 'scene-8b',
                    title: '觉醒 · 毁灭',
                    narrative: '封印彻底破碎，你的力量喷涌而出。天庭在你的怒火中颤抖，但你没有滥杀无辜。你只是要让所有人知道：三界之内，没有人能主宰你的命运。',
                    ending: 'ending-fire-rebel',
                    endingTitle: '第一章 · 莲花劫 · 完',
                    endingNarrative: '你成为三界最强大的叛逆者，令天庭闻风丧胆。但孤独也随之而来。火焰可以焚尽一切，却温暖不了自己。你站在云端，俯视众生，心中却在寻找一个答案。',
                    teaser: '即将开启：第二章 · 叛逆之路',
                    progress: 100
                },
                'scene-8c': {
                    id: 'scene-8c',
                    title: '沉眠 · 静心',
                    narrative: '你选择了沉眠。在莲池深处，你静静地守护着这片宁静。你的力量沉睡，但并未消失。每当三界有难，你都会感应到那份呼唤。',
                    ending: 'ending-lotus-peace',
                    endingTitle: '第一章 · 莲花劫 · 完',
                    endingNarrative: '你成为了一个传说，一段关于选择与智慧的故事。世人不知道，在那朵最美丽的莲花中，有一颗永远炽热的心在跳动。',
                    teaser: '即将开启：第二章 · 沉睡者的觉醒',
                    progress: 100
                },
                'scene-8d': {
                    id: 'scene-8d',
                    title: '沉眠 · 等待',
                    narrative: '你等待着下一个契机。千年的时光对你而言不过是弹指一挥间。你知道，命运的齿轮终会再次转动，届时你将再次现身。',
                    ending: 'ending-lotus-wait',
                    endingTitle: '第一章 · 莲花劫 · 完',
                    endingNarrative: '你的故事暂时落幕，但永远不会真正结束。在三界的某个角落，莲花依然绽放，火焰依然燃烧，而你——永远在等待。',
                    teaser: '即将开启：第二章 · 命运轮回',
                    progress: 100
                }
            }
        };
        
        let currentScene = 'scene-1';
        let visitedScenes = [];
        
        function goBack() {
            window.location.href = 'character-player.html';
        }
        
        function updateProgress(progress) {
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function renderScene(sceneId) {
            const container = document.getElementById('sceneContent');
            const scene = storyData.scenes[sceneId];
            
            if (!scene) return;
            
            // 检查是否是结局
            if (scene.ending) {
                renderEnding(scene);
                return;
            }
            
            // 淡出当前内容
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = `
                    <div class="character-display">
                        <img src="${storyData.characterImage}" alt="三太子" class="character-image">
                    </div>
                    <h2 class="scene-title">${scene.title}</h2>
                    <p class="narrative-text">${scene.narrative}</p>
                    <div class="choices-container">
                `;
                
                scene.choices.forEach(choice => {
                    html += `<button class="choice-btn" onclick="goToScene('${choice.target}')">${choice.text}</button>`;
                });
                
                html += '</div>';
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                // 更新进度
                updateProgress(scene.progress);
                
                // 触发动画
                setTimeout(() => {
                    document.querySelectorAll('.character-display, .scene-title, .narrative-text, .choices-container').forEach(el => {
                        el.classList.add('visible');
                    });
                }, 100);
                
                // 记录访问
                if (!visitedScenes.includes(sceneId)) {
                    visitedScenes.push(sceneId);
                }
            }, 500);
        }
        
        function renderEnding(scene) {
            const container = document.getElementById('sceneContent');
            
            container.classList.add('fade-out');
            
            setTimeout(() => {
                let html = `
                    <div class="character-display visible">
                        <img src="${storyData.characterImage}" alt="三太子" class="character-image">
                    </div>
                    <div class="chapter-end">
                        <h2>${scene.endingTitle}</h2>
                        <p class="narrative-text visible">${scene.endingNarrative}</p>
                        <p class="continue-hint" style="color: var(--lotus-pink); margin-top: 1.5rem; font-size: 1.1rem;">
                            ✦ ${scene.teaser} ✦
                        </p>
                        <a href="character-player.html" class="continue-btn">返回命运主角</a>
                        <a href="index.html" class="back-link">← 返回首页</a>
                    </div>
                `;
                
                container.innerHTML = html;
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
                
                updateProgress(scene.progress);
            }, 500);
        }
        
        function goToScene(sceneId) {
            currentScene = sceneId;
            renderScene(sceneId);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createFireParticles();
            createLotusPetals();
            renderScene('scene-1');
        });
    </script>
</body>
</html>
